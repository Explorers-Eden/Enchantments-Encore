name: Generate Wiki Files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-wiki-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-save prismarine-nbt pngjs

      - name: Cache vanilla assets
        uses: actions/cache@v4
        with:
          path: .cache/vanilla-assets
          key: vanilla-assets-${{ hashFiles('release_infos.yml', 'pack.mcmeta') }}

      - name: Download vanilla assets
        run: node scripts/download-vanilla-assets.js

      - name: Generate loot table markdown
        shell: bash
        run: |
          set -euo pipefail
          if find data -type f -path '*/loot_table/*.json' -print -quit 2>/dev/null | grep -q .; then
            node scripts/generate-loot-tables.js
          else
            echo "No loot table files found; skipping loot table markdown generation."
          fi

      - name: Generate structure markdown
        shell: bash
        run: |
          set -euo pipefail
          if find data -type f \( -path '*/worldgen/structure/*.json' -o -path '*/structure/*.nbt' \) -print -quit 2>/dev/null | grep -q .; then
            node scripts/generate-structures.js
          else
            echo "No structure files found; skipping structure markdown generation."
          fi

      - name: Generate structure preview images
        shell: bash
        run: |
          set -euo pipefail
          if find data -type f \( -path '*/worldgen/structure/*.json' -o -path '*/structure/*.nbt' \) -print -quit 2>/dev/null | grep -q .; then
            node scripts/generate-structure-previews.js
          else
            echo "No structure files found; skipping structure preview PNG generation."
          fi

      - name: Show generated wiki files
        shell: bash
        run: |
          set -euo pipefail
          echo "Generated markdown files:"
          if [ -d wiki/markdown ]; then
            find wiki/markdown -type f -name "*.md" -print | sort
          else
            echo "No wiki/markdown directory found."
          fi
          echo ""
          echo "Generated structure preview images:"
          if [ -d wiki/images/structures ]; then
            find wiki/images/structures -type f -name "*.png" -print | sort
          else
            echo "No wiki/images/structures directory found."
          fi
          echo ""
          echo "Git status:"
          git status --short

      - name: Upload generated preview images as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-structure-preview-images
          path: wiki/images/structures/**/*.png
          if-no-files-found: warn

      - name: Commit generated wiki files
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ ! -d wiki ]; then
            echo "No wiki directory exists; skipping commit."
            exit 0
          fi

          git add -A wiki

          if git diff --cached --quiet; then
            echo "No generated wiki changes to commit."
            exit 0
          fi

          git commit -m "Generate wiki files"
          git push
