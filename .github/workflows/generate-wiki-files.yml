name: Generate Wiki Files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-wiki-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-save prismarine-nbt pngjs

      - name: Cache vanilla assets
        uses: actions/cache@v4
        with:
          path: .cache/vanilla-assets
          key: vanilla-assets-${{ hashFiles('release_infos.yml', 'pack.mcmeta') }}

      - name: Download vanilla assets
        run: node scripts/download-vanilla-assets.js

      - name: Generate loot table markdown
        run: node scripts/generate-loot-tables.js

      - name: Generate structure markdown
        run: node scripts/generate-structures.js

      - name: Generate structure preview images
        run: node scripts/generate-structure-previews.js

      - name: Show generated wiki files
        run: |
          echo "Generated markdown files:"
          find wiki/markdown -type f -name "*.md" -print | sort || true
          echo ""
          echo "Generated structure preview images:"
          find wiki/images/structures -type f -name "*.png" -print | sort || true
          echo ""
          echo "Git status:"
          git status --short

      - name: Upload generated preview images as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-structure-preview-images
          path: wiki/images/structures/**/*.png
          if-no-files-found: warn

      - name: Commit generated wiki files
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A wiki/markdown wiki/images/structures

          if git diff --cached --quiet; then
            echo "No generated wiki changes to commit."
            exit 0
          fi

          git commit -m "Generate wiki files"
          git push
