```yaml
name: Publish Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pyyaml requests

      - name: Read metadata
        id: meta
        run: |
          python - <<'PY'
          import yaml, json, os

          info = yaml.safe_load(open("release_infos.yml"))

          version = str(info["Details"]["Version number"])
          name = str(info["Details"]["Version subtitle"])
          project_id = info["Project-ID"]
          versions = [str(v) for v in info["Meta Data"]["Versions"]]

          tag = f"v{version}"

          out = open(os.environ["GITHUB_OUTPUT"], "a")
          out.write(f"version={version}\n")
          out.write(f"name={name}\n")
          out.write(f"project_id={project_id}\n")
          out.write(f"tag={tag}\n")
          out.write(f"versions={json.dumps(versions)}\n")
          PY

      - name: Build ZIP + JAR
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          PROJECT_ID: ${{ steps.meta.outputs.project_id }}
        run: |
          python - <<'PY'
          import os, shutil, zipfile, json
          from pathlib import Path

          version = os.environ["VERSION"]
          project_id = os.environ["PROJECT_ID"]

          mod_id = "mr_enchantencore"
          mod_name = "Enchantments Encore"
          slug = "enchantments-encore"
          icon = "enchantencore_pack.png"
          description = "Enchantments Encore packaged as a universal data/resource mod."

          zip_name = f"enchantencore_{version}.zip"
          jar_name = f"enchantencore-{version}.jar"

          required = ["data", "pack.mcmeta", "pack.png"]
          missing = [p for p in required if not os.path.exists(p)]
          if missing:
              raise Exception(f"Missing required files: {missing}")

          # --- LANG SYNC ---
          assets_lang = Path("assets/enchantencore/lang")
          data_lang = Path("data/enchantencore/lang")

          if assets_lang.exists():
              if data_lang.exists():
                  shutil.rmtree(data_lang)
              shutil.copytree(assets_lang, data_lang)
              print("Synced lang assets → data")
          else:
              print("No assets lang folder, skipping")

          def add_files(z):
              for folder in ["assets", "data"]:
                  if not os.path.exists(folder):
                      continue
                  for root, _, files in os.walk(folder):
                      for f in files:
                          p = os.path.join(root, f)
                          z.write(p, os.path.relpath(p, "."))

              for f in ["pack.mcmeta", "pack.png", "LICENSE"]:
                  if os.path.exists(f):
                      z.write(f, f)

          # ZIP
          with zipfile.ZipFile(zip_name, "w", zipfile.ZIP_DEFLATED) as z:
              add_files(z)

          # BUILD JAR
          build = Path("build")
          if build.exists():
              shutil.rmtree(build)

          (build / "META-INF").mkdir(parents=True)

          if os.path.exists("assets"):
              shutil.copytree("assets", build / "assets")
          shutil.copytree("data", build / "data")

          for f in ["pack.mcmeta", "pack.png", "LICENSE"]:
              if os.path.exists(f):
                  shutil.copy2(f, build / f)

          shutil.copy2("pack.png", build / icon)

          # Fabric
          (build / "fabric.mod.json").write_text(json.dumps({
              "schemaVersion": 1,
              "id": mod_id,
              "version": version,
              "name": mod_name,
              "description": description,
              "license": "GPL-3.0-or-later",
              "icon": icon,
              "environment": "*",
              "depends": {
                  "fabric-resource-loader-v0": "*"
              }
          }))

          # Quilt
          (build / "quilt.mod.json").write_text(json.dumps({
              "schema_version": 1,
              "quilt_loader": {
                  "group": "com.modrinth",
                  "id": mod_id,
                  "version": version,
                  "metadata": {
                      "name": mod_name,
                      "description": description,
                      "icon": icon
                  },
                  "depends": [
                      {"id": "quilt_resource_loader", "versions": "*"}
                  ]
              }
          }))

          # Forge
          (build / "META-INF/mods.toml").write_text(f"""
modLoader="lowcodefml"
loaderVersion="[40,)"
license="GPL-3.0-or-later"

[[mods]]
modId="{mod_id}"
version="{version}"
displayName="{mod_name}"
logoFile="{icon}"
description="{description}"
""".strip())

          # NeoForge
          (build / "META-INF/neoforge.mods.toml").write_text(f"""
modLoader="javafml"
loaderVersion="[1,)"
license="GPL-3.0-or-later"

[[mods]]
modId="{mod_id}"
version="{version}"
displayName="{mod_name}"
logoFile="{icon}"
description="{description}"
""".strip())

          # Package JAR
          with zipfile.ZipFile(jar_name, "w", zipfile.ZIP_DEFLATED) as z:
              for root, _, files in os.walk(build):
                  for f in files:
                      p = Path(root) / f
                      z.write(p, p.relative_to(build).as_posix())

          print("Built ZIP + JAR")
          PY

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          NAME: ${{ steps.meta.outputs.name }}
        run: |
          gh release create "$TAG" *.zip *.jar \
            --title "$NAME" \
            --notes-file Changelog.log || true

      - name: Upload datapack to Modrinth
        env:
          TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          PROJECT: ${{ steps.meta.outputs.project_id }}
          VERSION: ${{ steps.meta.outputs.version }}
          NAME: ${{ steps.meta.outputs.name }}
          VERSIONS: ${{ steps.meta.outputs.versions }}
        run: |
          python - <<'PY'
          import os, json, requests

          payload = {
              "project_id": os.environ["PROJECT"],
              "name": os.environ["NAME"],
              "version_number": os.environ["VERSION"],
              "changelog": open("Changelog.log").read(),
              "game_versions": json.loads(os.environ["VERSIONS"]),
              "version_type": "release",
              "loaders": ["datapack"],
              "file_parts": ["file"]
          }

          with open([f for f in os.listdir() if f.endswith(".zip")][0], "rb") as f:
              requests.post(
                  "https://api.modrinth.com/v2/version",
                  headers={"Authorization": os.environ["TOKEN"]},
                  files={"data": (None, json.dumps(payload)), "file": f}
              )
          PY

      - name: Upload mod to Modrinth
        env:
          TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          PROJECT: ${{ steps.meta.outputs.project_id }}
          VERSION: ${{ steps.meta.outputs.version }}
          NAME: ${{ steps.meta.outputs.name }}
          VERSIONS: ${{ steps.meta.outputs.versions }}
        run: |
          python - <<'PY'
          import os, json, requests

          payload = {
              "project_id": os.environ["PROJECT"],
              "name": os.environ["NAME"] + " (Mod)",
              "version_number": os.environ["VERSION"] + "-mod",
              "changelog": open("Changelog.log").read(),
              "game_versions": json.loads(os.environ["VERSIONS"]),
              "version_type": "release",
              "loaders": ["fabric","forge","quilt","neoforge"],
              "file_parts": ["file"]
          }

          with open([f for f in os.listdir() if f.endswith(".jar")][0], "rb") as f:
              requests.post(
                  "https://api.modrinth.com/v2/version",
                  headers={"Authorization": os.environ["TOKEN"]},
                  files={"data": (None, json.dumps(payload)), "file": f}
              )
          PY
```
