name: Generate Structure Preview Images

on:
  workflow_dispatch:
  push:
    paths:
      - "data/**/structure/**/*.nbt"
      - "scripts/generate-structure-previews.js"
      - ".github/workflows/generate-structure-previews.yml"

permissions:
  contents: write

jobs:
  generate-structure-previews:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-save prismarine-nbt pngjs

      - name: Generate structure preview images
        run: node scripts/generate-structure-previews.js

      - name: Commit generated preview images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Generate structure preview images
          file_pattern: wiki/images/structures/**/*.png
