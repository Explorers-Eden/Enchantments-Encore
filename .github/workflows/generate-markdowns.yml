name: Generate Markdown

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-save prismarine-nbt

      - name: Generate loot table markdown
        run: node scripts/generate-loot-tables.js

      - name: Generate structure markdown
        run: node scripts/generate-structures.js

      - name: Commit generated markdown
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Generate wiki markdown
          file_pattern: wiki/markdown/**/*.md