name: Generate Loot Table Markdown

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate markdown files
        run: node scripts/generate-loot-tables.js

      - name: Commit generated markdown
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Generate loot table markdown
          file_pattern: markdown/loot_table/**/*.md